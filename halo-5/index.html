<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrega</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="entrega-header">
    <h1>📄 Entrega:</h1>
    <p class="archivo">index.html</p>

  <main class="contenedor">

    <!-- NIVEL 1 -->
    <section class="nivel">
      <div class="titulo-nivel nivel1">NIVEL 1</div>

      <div class="cajas">
        <div class="caja roja">rojo</div>
        <div class="caja verde">verde</div>
        <div class="caja azul">azul</div>
      </div>
    </section>

    <!-- NIVEL 2 -->
    <section class="nivel">
      <div class="titulo-nivel nivel2">NIVEL 2</div>
      <h2 class="que-hacer">🔍 Qué hacer</h2>

      <div class="tarjetas">

        <div class="tarjeta">
          <span class="etiqueta">Nuevo</span>
          <h3>Diseño Web</h3>
          <p>Aprende HTML y CSS desde cero.</p>
        </div>

        <div class="tarjeta">
          <span class="etiqueta">Popular</span>
          <h3>JavaScript</h3>
          <p>Programación para el navegador.</p>
        </div>

        <div class="tarjeta">
          <span class="etiqueta">Nuevo</span>
          <h3>Backend</h3>
          <p>Servidores y bases de datos.</p>
        </div>

      </div>
