<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoria Gamer</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Tipografia arcade (solo para titulos/contadores) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container py-4">

    <!-- TITULO -->
    <header class="text-center mb-4">
      <h1 class="titulo-juego">
        <i class="bi bi-controller"></i> MEMORIA GAMER <i class="bi bi-controller"></i>
      </h1>
      <p class="subtitulo">Encontrá los 10 pares de iconos</p>
    </header>

    <!-- HUD: contadores, mensaje y botones -->
    <div class="hud row g-3 align-items-center mb-4 p-3">

      <div class="col-6 col-md-3">
        <div class="stat-box text-center">
          <div class="stat-label">Intentos</div>
          <div class="stat-value" id="contador-intentos">0</div>
        </div>
      </div>

      <div class="col-6 col-md-3">
        <div class="stat-box text-center">
          <div class="stat-label">Pares encontrados</div>
          <div class="stat-value" id="contador-pares">0 / 10</div>
        </div>
      </div>

      <div class="col-12 col-md-3 text-center">
        <span id="mensaje-juego" class="badge mensaje-badge">¡Par encontrado!</span>
      </div>

      <div class="col-12 col-md-3 d-flex justify-content-center gap-2">
        <button type="button" class="btn btn-success btn-sm" id="btn-empezar">
          <i class="bi bi-play-fill"></i> Empezar
        </button>
        <button type="button" class="btn btn-warning btn-sm" id="btn-reiniciar">
          <i class="bi bi-arrow-clockwise"></i> Reiniciar
        </button>
        <button type="button" class="btn btn-danger btn-sm" id="btn-terminar">
          <i class="bi bi-stop-fill"></i> Terminar
        </button>
      </div>

    </div>

    <!-- TABLERO -->
    <div class="row g-3 justify-content-center" id="tablero">

      <!-- Par 1: controller -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="controller">
          <div class="card-body text-center">
            <i class="bi bi-controller"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="controller">
          <div class="card-body text-center">
            <i class="bi bi-controller"></i>
          </div>
        </div>
      </div>

      <!-- Par 2: joystick -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="joystick">
          <div class="card-body text-center">
            <i class="bi bi-joystick"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="joystick">
          <div class="card-body text-center">
            <i class="bi bi-joystick"></i>
          </div>
        </div>
      </div>

      <!-- Par 3: trofeo -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="trofeo">
          <div class="card-body text-center">
            <i class="bi bi-trophy-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="trofeo">
          <div class="card-body text-center">
            <i class="bi bi-trophy-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 4: dado -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="dado">
          <div class="card-body text-center">
            <i class="bi bi-dice-5-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="dado">
          <div class="card-body text-center">
            <i class="bi bi-dice-5-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 5: rompecabezas -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="puzzle">
          <div class="card-body text-center">
            <i class="bi bi-puzzle-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="puzzle">
          <div class="card-body text-center">
            <i class="bi bi-puzzle-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 6: auriculares gamer -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="headset">
          <div class="card-body text-center">
            <i class="bi bi-headset"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="headset">
          <div class="card-body text-center">
            <i class="bi bi-headset"></i>
          </div>
        </div>
      </div>

      <!-- Par 7: rayo (power up) -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="rayo">
          <div class="card-body text-center">
            <i class="bi bi-lightning-charge-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="rayo">
          <div class="card-body text-center">
            <i class="bi bi-lightning-charge-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 8: estrella -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="estrella">
          <div class="card-body text-center">
            <i class="bi bi-star-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="estrella">
          <div class="card-body text-center">
            <i class="bi bi-star-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 9: vida (corazon) -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="vida">
          <div class="card-body text-center">
            <i class="bi bi-heart-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="vida">
          <div class="card-body text-center">
            <i class="bi bi-heart-fill"></i>
          </div>
        </div>
      </div>

      <!-- Par 10: escudo (defensa) -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="escudo">
          <div class="card-body text-center">
            <i class="bi bi-shield-fill"></i>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta" data-card="escudo">
          <div class="card-body text-center">
            <i class="bi bi-shield-fill"></i>
          </div>
        </div>
      </div>

      <!-- Carta extra: reverso (dorso) para usar mas adelante con JS -->
      <div class="col-6 col-md-4 col-lg-3 col-xl-2">
        <div class="card carta carta-reverso" data-card="reverso">
          <div class="card-body text-center">
            <span class="signo-interrogacion">?</span>
          </div>
        </div>
      </div>

    </div>

    <footer class="text-center mt-4 footer-nota">
      <p>Interfaz lista para conectar la logica del juego con JavaScript.</p>
    </footer>

  </div>

  <!-- Bootstrap JS (bundle con Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
